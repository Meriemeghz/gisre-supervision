services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: gisre_zookeeper
    restart: always
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: gisre_kafka
    restart: always
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1

  postgres:
    image: postgres:15
    container_name: gisre_postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: gisre_db
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database:/docker-entrypoint-initdb.d

  redis:
    image: redis:7-alpine
    container_name: gisre_redis
    restart: always
    ports:
      - "6379:6379"

  simulator:
    build: ./simulator
    container_name: gisre_simulator
    depends_on:
      - postgres
      - kafka
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: gisre_db
      DB_USER: admin
      DB_PASSWORD: admin
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    volumes:
      - ./simulator:/app
    command: python main.py

  backend:
    build: ./backend
    container_name: gisre_backend
    restart: always
    depends_on:
      - postgres
      - kafka
    environment:
      KAFKA_BROKERS: kafka:9092
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: gisre_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      PORT: 3000
    ports:
      - "3000:3000"

  ai-layer:
    build: ./ai-layer
    container_name: gisre_ai_layer
    restart: always
    depends_on:
      - kafka
      - postgres
      - redis
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_GROUP_ID: gisre-ai-consumer-group
      KAFKA_API_CALLS_TOPIC: gisre.api.calls
      KAFKA_AUDIT_EVENTS_TOPIC: gisre.audit.events
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: gisre_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      AI_ENABLE_REALTIME: "true"
      AI_ENABLE_HISTORICAL: "true"
      MODEL_STORAGE_DIR: /app/models
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      REDIS_URL: redis://redis:6379/0
      CACHE_ENABLED: "true"
      RL_TRIAGE_ENABLED: "true"
      RL_MIN_EXPERIENCES: "1"
      RL_CONFIDENCE_THRESHOLD: "0.50"
      RL_EPSILON: "0.10"
      INCLUDE_DEMO_FEEDBACK: "true"
    ports:
      - "8000:8000"
    volumes:
      - ./ai-layer/models:/app/models

  frontend:
    build: ./frontend
    container_name: gisre_frontend
    restart: always
    depends_on:
      - backend
      - ai-layer
    environment:
      NEXT_PUBLIC_BACKEND_API_URL: /api/backend
      NEXT_PUBLIC_AI_API_URL: /api/ai
      BACKEND_INTERNAL_API_URL: http://backend:3000
      AI_INTERNAL_API_URL: http://ai-layer:8000
    ports:
      - "4000:4000"

volumes:
  postgres_data:
